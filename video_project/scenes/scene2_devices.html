<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1920px;height:1080px;overflow:hidden;font-family:'Cairo',sans-serif;background:#070E1C;}
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 90% 70% at 0% 50%, #7B2FFF28 0%, transparent 55%),
  radial-gradient(ellipse 90% 70% at 100% 50%, #00D4FF28 0%, transparent 55%),
  radial-gradient(ellipse 60% 50% at 50% 100%, #FF006E18 0%, transparent 55%),
  linear-gradient(180deg,#070E1C 0%,#0D1B35 100%);}
.bg-img{position:absolute;inset:0;background:url('file:///home/runner/workspace/video_project/assets/bg2_devices.png') center/cover;opacity:0.32;}
.grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,212,255,0.09) 1px,transparent 1px);background-size:44px 44px;}
.topbar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#7B2FFF,#FF006E,#FFB700,#00FF87,#00D4FF,#7B2FFF);}
.bottombar{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00D4FF,#7B2FFF,#FF006E);}
.corner{position:absolute;width:100px;height:100px;}
.corner.tl{top:20px;left:20px;border-top:2px solid rgba(123,47,255,0.5);border-left:2px solid rgba(123,47,255,0.5);}
.corner.tr{top:20px;right:20px;border-top:2px solid rgba(0,212,255,0.5);border-right:2px solid rgba(0,212,255,0.5);}
.corner.bl{bottom:20px;left:20px;border-bottom:2px solid rgba(255,183,0,0.5);border-left:2px solid rgba(255,183,0,0.5);}
.corner.br{bottom:20px;right:20px;border-bottom:2px solid rgba(0,255,135,0.5);border-right:2px solid rgba(0,255,135,0.5);}
/* center text */
.center-text{position:absolute;top:42px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;white-space:nowrap;}
.section-tag{font-size:14px;font-weight:700;letter-spacing:0.15em;color:#00D4FF;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;}
.section-tag::before,.section-tag::after{content:'';width:50px;height:1.5px;background:linear-gradient(90deg,transparent,#00D4FF,transparent);}
.main-title{font-size:52px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(0,212,255,0.4);}
.main-title span{background:linear-gradient(90deg,#00F5FF,#7B2FFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* LAPTOP */
.laptop-wrap{position:absolute;left:80px;top:130px;width:980px;height:640px;}
.laptop-screen-frame{position:absolute;top:0;left:0;right:0;bottom:72px;background:#08111E;border-radius:14px 14px 0 0;border:2.5px solid rgba(0,212,255,0.35);overflow:hidden;box-shadow:0 0 100px rgba(0,212,255,0.30),0 30px 90px rgba(0,0,0,0.65);}
.laptop-screen-frame img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.laptop-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:8px;background:#000;border-radius:0 0 6px 6px;z-index:2;}
.laptop-base-frame{position:absolute;bottom:0;left:-60px;right:-60px;height:70px;background:linear-gradient(180deg,#1a1f35,#111525);border-radius:0 0 28px 28px;border:1.5px solid rgba(255,255,255,0.07);border-top:none;}
.laptop-base-frame::after{content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);width:100px;height:8px;background:rgba(255,255,255,0.08);border-radius:5px;}
.laptop-label{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:700;color:rgba(0,212,255,0.8);white-space:nowrap;direction:rtl;}
/* laptop screen glow */
.laptop-glow{position:absolute;top:-10px;left:-10px;right:-10px;bottom:62px;border-radius:18px;border:1px solid rgba(0,212,255,0.15);box-shadow:0 0 80px rgba(0,212,255,0.20);}
/* PHONE */
.phone-wrap{position:absolute;right:70px;top:110px;width:280px;height:560px;}
.phone-frame{position:absolute;inset:0;background:#08111E;border-radius:38px;border:3px solid rgba(123,47,255,0.50);overflow:hidden;box-shadow:0 0 80px rgba(123,47,255,0.35),0 30px 80px rgba(0,0,0,0.60);}
.phone-frame img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.phone-notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:80px;height:20px;background:#000;border-radius:14px;z-index:2;}
.phone-home{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:60px;height:5px;background:rgba(255,255,255,0.25);border-radius:4px;z-index:2;}
.phone-label{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:700;color:rgba(123,47,255,0.9);white-space:nowrap;direction:rtl;}
.phone-glow{position:absolute;inset:-10px;border-radius:46px;border:1px solid rgba(123,47,255,0.20);box-shadow:0 0 60px rgba(123,47,255,0.25);}
/* VS badge in middle */
.vs-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7B2FFF,#00D4FF);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 0 40px rgba(0,212,255,0.50),0 0 80px rgba(123,47,255,0.35);}
/* Phone mockup UI */
.phone-ui{width:100%;height:100%;background:#0a1628;padding:50px 12px 30px;display:flex;flex-direction:column;gap:10px;}
.phone-header{font-size:13px;font-weight:800;color:#fff;direction:rtl;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08);}
.phone-member{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;direction:rtl;margin-bottom:6px;}
.pm-name{font-size:12px;font-weight:700;color:#fff;}
.pm-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;}
.pm-badge{display:inline-flex;margin-top:4px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(0,212,255,0.15);color:#00D4FF;border:1px solid rgba(0,212,255,0.25);}
.phone-bottom-nav{margin-top:auto;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid rgba(255,255,255,0.08);}
.nav-icon{font-size:18px;opacity:0.6;}
.nav-icon.active{opacity:1;}
</style></head><body>
<div class="bg"></div><div class="bg-img"></div><div class="grid"></div>
<div class="topbar"></div><div class="bottombar"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="center-text">
  <div class="section-tag">متوافق مع جميع أجهزتك</div>
  <div class="main-title">يعمل على <span>اللابتوب والهاتف</span></div>
</div>

<!-- LAPTOP -->
<div class="laptop-wrap">
  <div class="laptop-glow"></div>
  <div class="laptop-screen-frame">
    <div class="laptop-notch"></div>
    <img src="file:///home/runner/workspace/video_project/screenshots/s1_login.jpg" alt=""/>
  </div>
  <div class="laptop-base-frame"></div>
  <div class="laptop-label">💻 &nbsp;الحاسوب المكتبي والمحمول</div>
</div>

<!-- VS badge -->
<div class="vs-badge">+</div>

<!-- PHONE -->
<div class="phone-wrap">
  <div class="phone-glow"></div>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-ui">
      <div class="phone-header">قائمة الأعضاء</div>
      <div class="phone-member"><div class="pm-name">د. أحمد سليم</div><div class="pm-sub">قلبية داخلية · دمشق</div><div class="pm-badge">أصيل</div></div>
      <div class="phone-member"><div class="pm-name">د. سمر خليل</div><div class="pm-sub">جراحة قلب · حلب</div><div class="pm-badge">أصيل</div></div>
      <div class="phone-member"><div class="pm-name">د. محمد عيسى</div><div class="pm-sub">قلبية · حمص</div><div class="pm-badge">مشارك</div></div>
      <div class="phone-member"><div class="pm-name">د. رنا حسون</div><div class="pm-sub">جراحة قلب · دمشق</div><div class="pm-badge">أصيل</div></div>
      <div class="phone-member"><div class="pm-name">د. وليد ناصر</div><div class="pm-sub">قلبية · حماة</div><div class="pm-badge">أصيل</div></div>
      <div class="phone-bottom-nav">
        <div class="nav-icon active">🏠</div>
        <div class="nav-icon">👥</div>
        <div class="nav-icon">📊</div>
        <div class="nav-icon">⚙️</div>
      </div>
    </div>
    <div class="phone-home"></div>
  </div>
  <div class="phone-label">📱 &nbsp;الهاتف الذكي</div>
</div>

</body></html>
